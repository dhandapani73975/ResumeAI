# ==========================================================================
# ResumeAI Docker Compose Orchestration Setup
# ==========================================================================

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: resumeai_postgres_db
    environment:
      POSTGRES_DB: resume_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resume_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: resumeai_django_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-ai-resume-analyzer-key-2026-very-secret
      - ALLOWED_HOSTS=*
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DB_ENGINE=postgresql
      - DB_NAME=resume_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
